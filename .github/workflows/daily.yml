name: GitHub Trending Daily Push

on:
  schedule:
    # Beijing time 09:00 = UTC 01:00
    - cron: "37 1 * * *"
  workflow_dispatch:
    inputs:
      enable_ai:
        description: "Enable AI summary"
        type: boolean
        default: true
      debug:
        description: "Enable debug output"
        type: boolean
        default: false

concurrency:
  group: trending-daily-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run daily push
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          DEBUG: ${{ inputs.debug || 'false' }}
        run: python main.py

      - name: Commit history
        if: always()
        continue-on-error: true
        run: |
          if [ -f data/history.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/history.json
            git diff --cached --quiet || git commit -m "[skip ci] Update daily trending history"
            git push || echo "Push failed (non-critical)"
          fi
